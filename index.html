<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resolvent Digital Business Cards</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,sans-serif;background:#eef3f8;color:#123b66;padding:24px}
    .box{background:#fff;padding:32px;border-radius:20px;box-shadow:0 15px 40px rgba(18,59,102,.15);max-width:560px;width:100%;text-align:center}
    img{width:190px;max-width:70%;height:auto}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:24px}
    a{padding:16px;border-radius:12px;background:#123b66;color:#fff;text-decoration:none;font-weight:700}
    @media(max-width:520px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="box">
    <img src="assets/Resolvent_Logo.jpg" alt="Resolvent IT Services">
    <h1>Digital Business Cards</h1>
    <p>Select a contact</p>
    <div class="grid">
      <a href="neeraj-desai/">Neeraj Desai</a>
      <a href="neeraj-sahu/">Neeraj Sahu</a>
    </div>
  </main>
</body>
</html>
